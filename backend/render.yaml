# Render Blueprint — deploy backend + Postgres in one go.
# Usage: in Render dashboard, click "New +" → "Blueprint" → point to this repo.
# Render will auto-detect this file (must be at repo root, see also ../render.yaml).

services:
  - type: web
    name: healthai-ethics-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: healthai-ethics-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      # Set these manually in the Render dashboard (Environment tab):
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # IMPORTANT: after first deploy, copy the Render service URL here, then redeploy.
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false  # e.g. ["https://your-frontend.pages.dev"]

databases:
  - name: healthai-ethics-db
    plan: free
    databaseName: healthai_ethics
    user: healthai
